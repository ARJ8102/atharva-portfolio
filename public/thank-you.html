<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent | Atharva Jadhav</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f2f2f2;
        color: #111111;
      }

      .card {
        width: min(520px, calc(100% - 32px));
        background: white;
        padding: 42px;
        border-radius: 18px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 2.2rem;
      }

      p {
        color: #747b84;
        line-height: 1.6;
        margin-bottom: 28px;
      }

      a {
        display: inline-block;
        text-decoration: none;
        background: #ff4b12;
        color: white;
        padding: 14px 24px;
        border-radius: 999px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Message sent!</h1>
      <p>Thank you for reaching out. I will get back to you soon.</p>
      <a href="/">Back to portfolio</a>
    </div>
  </body>
</html>
